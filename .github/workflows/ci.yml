name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UPLOAD_TEST_ARTIFACTS: "false"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEFAULT_SUITE_FILE: src/test/resources/testng/testng-jsonapi.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: |
          mvn --batch-mode --no-transfer-progress clean test \
            -Dtarget.suite.xml.file="$DEFAULT_SUITE_FILE"

      - name: Upload test artifacts
        if: always() && env.UPLOAD_TEST_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: test-artifacts-${{ github.run_id }}
          path: |
            target/allure-results
            target/surefire-reports
          if-no-files-found: warn
          compression-level: 0
