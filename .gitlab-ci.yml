#TODO: variabiliser target.suite.xml.file pour obliger le choix entre telle ou telle API. Et mettre en place un fallback
tests:
  image: $CI_REGISTRY_IMAGE/maven-java21:latest
  stage: run_tests
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  script:
    - |
      mvn clean test -Dapi.url=${API_URL} \
                     -Dtarget.suite.xml.file=src/test/resources/testng/testng-jsonapi.xml \
                     -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    - |
      if [ -d "$BACKUP_HISTORY_DIR" ] && [ "$(ls -A $BACKUP_HISTORY_DIR)" ]; then
        mkdir -p $ALLURE_RESULTS_DIR/history
        cp -rv $BACKUP_HISTORY_DIR/* $ALLURE_RESULTS_DIR/history/
      else
        echo "Aucun historique trouvé"
      fi
  # autoriser les erreurs (fail gracefully) pour les capturer dans le rapport Allure
  allow_failure: true
  artifacts:
    when: always
    paths:
      - $ALLURE_RESULTS_DIR/*
    expire_in: 1 week

generate_allure_report:
  image: $CI_REGISTRY_IMAGE/maven-java21:latest
  stage: make_reports
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  script:
    - mvn allure:report -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    - |
      if [ ! -d "$ALLURE_REPORT_DIR" ]; then
        echo "Allure report directory not found. Creating a dummy report."
        mkdir -p $ALLURE_REPORT_DIR
        echo "<html><body><h1>Allure Report</h1><p>Report generation failed. Please check the pipeline logs.</p></body></html>" > $ALLURE_REPORT_DIR/index.html
      fi
  artifacts:
    when: always
    paths:
      - $ALLURE_REPORT_DIR
      - $ALLURE_RESULTS_DIR/*
    expire_in: 1 week

pages:
  image: $CI_REGISTRY_IMAGE/lightweight:latest
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  script:
    - git config --global user.name "GitLab CI automation"
    - git config --global user.email "augustin@bengolea.com"

    - rm -rf public

    - |
      git clone --depth 1 --branch pages \
        https://oauth2:${PAT_CI_CUSTOM_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git public || mkdir public

    - mkdir -p public/reports/$CI_PIPELINE_ID
    - cp -r $ALLURE_REPORT_DIR/* public/reports/$CI_PIPELINE_ID

    - ls -la public/reports/$CI_PIPELINE_ID

    - chmod +x ./scripts/generate_report_specifics.sh
    - ./scripts/generate_report_specifics.sh

    - ls -la public/reports/$CI_PIPELINE_ID

    - cd public
    - git add .
    - git commit -m "[skip ci] Add report for pipeline $CI_PIPELINE_ID" || echo "No changes to commit"
    - git push https://oauth2:${PAT_CI_CUSTOM_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git pages
  artifacts:
    paths:
      - public
