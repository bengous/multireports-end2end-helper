image: maven:3.9.8-eclipse-temurin-21
stages:
  - dockerize
  - prepare
  - run_tests
  - make_reports
  - deploy

# TODO: renable job later
#- notify

variables:
  ALLURE_RESULTS_DIR: target/allure-results
  ALLURE_REPORT_DIR: target/site/allure-maven-plugin
  URL_GITLAB: https://gitlab.com/
  BACKUP_HISTORY_DIR: backup/history
  API_URL:
    value: ""
    description: |
      L'URL de l'environnement à tester. Par exemple l'environnement de qualif,
      ou un environnement Openshift d'une issue en cours...
      Si cette variable n'est pas définie, alors un fallback vers l'environnement "master" sera utilisé.
  TARGET_API:
    value: "test1"
    description: L'API à tester.
    options:
      - "test1"
      - "test2"
  REPORT_DIR: "public/${CI_COMMIT_REF_NAME}/${CI_PIPELINE_ID}"
  INDEX_FILE: "public/index.html"
  REPORTS_BASE_DIR: allure-reports

cache:
  paths:
    - .m2/repository

# Docker image caching -> https://gitlab.com/augustin_bengolea/maven-e2e-archetype/container_registry
# https://docs.gitlab.com/ee/ci/docker/docker_layer_caching.html
prepare:
  stage: dockerize
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $UPDATE_MAVEN_IMAGE
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull maven:3.9.8-eclipse-temurin-21
    - docker tag maven:3.9.8-eclipse-temurin-21 $CI_REGISTRY_IMAGE/maven:3.9.8-eclipse-temurin-21
    - docker push $CI_REGISTRY_IMAGE/maven:3.9.8-eclipse-temurin-21

# TODO: maven package caching -> https://gitlab.com/augustin_bengolea/maven-e2e-archetype/-/packages
#   find the docs and the way of doing that

backup_history:
  stage: prepare
  script:
    - apt-get update && apt-get install -y unzip
    - chmod +x ./scripts/backup_allure_history.sh
    - ./scripts/backup_allure_history.sh
    - mkdir -p $REPORTS_BASE_DIR
  artifacts:
    paths:
      - $BACKUP_HISTORY_DIR
    expire_in: 1 week

#TODO: variabiliser target.suite.xml.file pour obliger le choix entre telle ou telle API. Et mettre en place un fallback
tests:
  stage: run_tests
  script:
    - |
      mvn clean test -Dapi.url=${API_URL} \
                     -Dtarget.suite.xml.file=src/test/resources/testng/testng-jsonapi.xml
    - |
      if [ -d "$BACKUP_HISTORY_DIR" ] && [ "$(ls -A $BACKUP_HISTORY_DIR)" ]; then
        mkdir -p $ALLURE_RESULTS_DIR/history
        cp -rv $BACKUP_HISTORY_DIR/* $ALLURE_RESULTS_DIR/history/
      else
        echo "Aucun historique trouvé"
      fi
  # autoriser les erreurs (fail gracefully) pour les capturer dans le rapport Allure
  allow_failure: true
  artifacts:
    when: always
    paths:
      - $ALLURE_RESULTS_DIR/*
    expire_in: 1 week

generate_allure_report:
  stage: make_reports
  script:
    - mvn allure:report
    - |
      if [ ! -d "$ALLURE_REPORT_DIR" ]; then
        echo "Allure report directory not found. Creating a dummy report."
        mkdir -p $ALLURE_REPORT_DIR
        echo "<html><body><h1>Allure Report</h1><p>Report generation failed. Please check the pipeline logs.</p></body></html>" > $ALLURE_REPORT_DIR/index.html
      fi
  artifacts:
    when: always
    paths:
      - $ALLURE_REPORT_DIR
    expire_in: 1 week

pages:
  stage: deploy
  script:
    - apk add --no-cache curl unzip jq
    - |
      mkdir -p public
      if [ -d "$ALLURE_REPORT_DIR" ]; then
        mv $ALLURE_REPORT_DIR/* public/
      else
        echo "<html><body><h1>Allure Report</h1><p>Report not available. Please check the pipeline logs.</p></body></html>" > public/index.html
      fi
      
      # Generate index.html with links to current and previous reports
      echo "<html><body><h1>Allure Reports</h1><ul>" > public/main_index.html
      
      # Add link to current report
      echo "<li><a href='index.html'>Current Report (Pipeline ${CI_PIPELINE_ID})</a></li>" >> public/main_index.html
      
      # Fetch information about previous jobs and add links
      JOBS=$(curl --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs?scope[]=success&per_page=10")
      echo $JOBS | jq -r '.[] | select(.name == "pages") | [.id, .pipeline.id] | @tsv' | while read job_id pipeline_id; do
        if [ "$pipeline_id" != "$CI_PIPELINE_ID" ]; then
          echo "<li><a href='${CI_PROJECT_URL}/-/jobs/${job_id}/artifacts/public/index.html'>Pipeline ${pipeline_id}</a></li>" >> public/main_index.html
        fi
      done
      
      echo "</ul></body></html>" >> public/main_index.html
      mv public/main_index.html public/index.html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

