stages:
  - build_caches
  - run_tests
  - make_reports
  - deploy

variables:
  ALLURE_RESULTS_DIR: target/allure-results
  ALLURE_REPORT_DIR: target/site/allure-maven-plugin
  URL_GITLAB: https://gitlab.com/
  BACKUP_HISTORY_DIR: backup/history
  API_URL:
    value: ""
    description: |
      L'URL de l'environnement à tester. Par exemple l'environnement de qualif,
      ou un environnement Openshift d'une issue en cours...
      Si cette variable n'est pas définie, alors un fallback vers l'environnement "master" sera utilisé.
  TARGET_API:
    value: "test1"
    description: L'API à tester.
    options:
      - "test1"
      - "test2"
  REPORT_DIR: "public/${CI_COMMIT_REF_NAME}/${CI_PIPELINE_ID}"
  INDEX_FILE: "public/index.html"
  REPORTS_BASE_DIR: allure-reports
  SCRIPTS_DEBUG_MODE:
    value: "disabled"
    description: Enable debug mode. Useful when debugging bash scripts within the CI.
    options:
      - "enabled"
      - "disabled"

cache:
  key: "global-maven-cache"
  paths:
    - .m2/repository
  policy: pull-push

# Docker image caching
# Documentation :
# - https://docs.gitlab.com/ee/ci/docker/docker_layer_caching.
# - Build & Use Custom Docker images in your GitLab CI/CD pipeline : https://www.youtube.com/watch?v=7I6tHw68DMQ
# - https://dev.to/zenika/gitlab-ci-optimization-15-tips-for-faster-pipelines-55al#2-use-small-linux-distributions
build_docker_image:
  stage: build_caches
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: $CI_COMMIT_BRANCH
      changes:
        paths:
          - docker/**
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true

    - |
      docker build --build-arg BUILDKIT_INLINE_CACHE=1 \
      --cache-from $CI_REGISTRY_IMAGE:latest \
      --tag $CI_REGISTRY_IMAGE/lightweight:$CI_COMMIT_SHA \
      --tag $CI_REGISTRY_IMAGE/lightweight:latest \
      -f docker/lightweight/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/lightweight:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/lightweight:latest

    - |
      docker build --build-arg BUILDKIT_INLINE_CACHE=1 \
      --cache-from $CI_REGISTRY_IMAGE:latest \
      --tag $CI_REGISTRY_IMAGE/maven-java21:$CI_COMMIT_SHA \
      --tag $CI_REGISTRY_IMAGE/maven-java21:latest \
      -f docker/maven-java21/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/maven-java21:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/maven-java21:latest

